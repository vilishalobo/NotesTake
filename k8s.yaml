# --- 1. BACKEND DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notestake-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notestake-backend
  template:
    metadata:
      labels:
        app: notestake-backend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: backend-api
          image: ghcr.io/vilishalobo/notestake-ai:latest
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-uri
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secret
                  key: api-key
            - name: FIREBASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: firebase-secret
                  key: api-key

---
# --- 2. BACKEND SERVICE (Internal Networking) ---
apiVersion: v1
kind: Service
metadata:
  name: notestake-backend-svc
spec:
  selector:
    app: notestake-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP

---
# --- 3. FRONTEND DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notestake-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notestake-frontend
  template:
    metadata:
      labels:
        app: notestake-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: frontend-web
          image: ghcr.io/vilishalobo/notestake-frontend:latest # Built from frontend/client
          ports:
            - containerPort: 80

---
# --- 4. FRONTEND SERVICE (External Access) ---
apiVersion: v1
kind: Service
metadata:
  name: notestake-frontend-svc
spec:
  selector:
    app: notestake-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer # Access via http://localhost on Docker Desktop